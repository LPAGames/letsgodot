<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: sans-serif; }
        #info { position: absolute; top: 10px; width: 100%; text-align: center; color: white; text-shadow: 1px 1px 3px black; pointer-events: none; z-index: 100; }
    </style>
    <!-- Import Maps to load Three.js, Addons, and Rapier3D -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
          "@dimforge/rapier3d-compat": "https://unpkg.com/@dimforge/rapier3d-compat@0.12.0/rapier.es.js"
        }
      }
    </script>
</head>
<body>
    <div id="info">Loading Physics Simulation...</div>
    
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import RAPIER from '@dimforge/rapier3d-compat';

        async function runPhysics() {
            // 1. Initialize Rapier
            await RAPIER.init();
            document.getElementById('info').innerText = "Drag to Rotate | Scroll to Zoom";

            // 2. Three.js Setup (Scene, Camera, Renderer)
            const scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x87ceeb, 20, 100); // Add a nice sky-colored fog

            const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 15, 30);

            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true; // Enable Shadows
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);

            // Add Mouse Controls
            const controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            // 3. Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
            dirLight.position.set(10, 30, 10);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 2048;
            dirLight.shadow.mapSize.height = 2048;
            dirLight.shadow.camera.left = -20;
            dirLight.shadow.camera.right = 20;
            dirLight.shadow.camera.bottom = -20;
            dirLight.shadow.camera.top = 20;
            scene.add(dirLight);

            // 4. Setup Rapier Physics World
            const gravity = { x: 0.0, y: -9.81, z: 0.0 };
            const world = new RAPIER.World(gravity);

            const dynamicObjects =[]; // Array to link Three.js meshes with Rapier Bodies

            // 5. Create Static Ground (Floor)
            const groundGeo = new THREE.BoxGeometry(40, 1, 40);
            const groundMat = new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.8 });
            const groundMesh = new THREE.Mesh(groundGeo, groundMat);
            groundMesh.receiveShadow = true;
            groundMesh.position.y = -0.5;
            scene.add(groundMesh);

            const groundBodyDesc = RAPIER.RigidBodyDesc.fixed().setTranslation(0, -0.5, 0);
            const groundBody = world.createRigidBody(groundBodyDesc);
            const groundColliderDesc = RAPIER.ColliderDesc.cuboid(20.0, 0.5, 20.0);
            world.createCollider(groundColliderDesc, groundBody);

            // 6. Spawn Multiple Falling Objects
            const boxGeo = new THREE.BoxGeometry(1, 1, 1);
            const sphereGeo = new THREE.SphereGeometry(0.6, 32, 32);
            
            const materials =[
                new THREE.MeshStandardMaterial({ color: 0xff4444, roughness: 0.2 }), // Shiny Red
                new THREE.MeshStandardMaterial({ color: 0x44ff44, roughness: 0.2 }), // Shiny Green
                new THREE.MeshStandardMaterial({ color: 0x4444ff, roughness: 0.2 })  // Shiny Blue
            ];

            // Drop 50 random objects
            for (let i = 0; i < 50; i++) {
                const isBox = Math.random() > 0.5;
                const mesh = new THREE.Mesh(isBox ? boxGeo : sphereGeo, materials[i % 3]);
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                scene.add(mesh);

                // Randomize spawn positions
                const x = (Math.random() - 0.5) * 8;
                const y = 10 + (i * 1.5); // Stack them up so they rain down
                const z = (Math.random() - 0.5) * 8;

                // Create Physics Body
                const bodyDesc = RAPIER.RigidBodyDesc.dynamic().setTranslation(x, y, z);
                const body = world.createRigidBody(bodyDesc);
                
                // Create Physics Collider
                const colliderDesc = isBox 
                    ? RAPIER.ColliderDesc.cuboid(0.5, 0.5, 0.5)
                    : RAPIER.ColliderDesc.ball(0.6);
                
                colliderDesc.setRestitution(0.7); // Make them bouncy!
                world.createCollider(colliderDesc, body);

                // Save to array to sync later
                dynamicObjects.push({ mesh, body });
            }

            // 7. Game / Animation Loop
            function animate() {
                requestAnimationFrame(animate);

                // Step the physics world forward
                world.step();

                // Loop through all dynamic objects and apply physics coordinates to Three.js meshes
                for (let i = 0; i < dynamicObjects.length; i++) {
                    const obj = dynamicObjects[i];
                    const position = obj.body.translation();
                    const rotation = obj.body.rotation();
                    
                    obj.mesh.position.set(position.x, position.y, position.z);
                    obj.mesh.quaternion.set(rotation.x, rotation.y, rotation.z, rotation.w);
                }

                controls.update();
                renderer.render(scene, camera);
            }
            animate();

            // Handle window resizing
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        runPhysics();
    </script>
</body>
</html>
