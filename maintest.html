<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spherical Medieval World</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050508; font-family: 'Georgia', serif; }
        canvas { display: block; }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #e0d0b0;
            pointer-events: none;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        h1 { margin: 0; font-size: 24px; letter-spacing: 2px; text-transform: uppercase; }
        p { margin: 5px 0; font-style: italic; opacity: 0.8; }
        .controls {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: #888;
            font-size: 12px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="ui">
        <h1>The Tiny Kingdom - For Maltecus</h1>
        <p>A revolving realm in the cosmic void</p>
    </div>

    <div class="controls">Drag to Rotate • Scroll to Zoom</div>

    <!-- Load Three.js from a CDN (Essential dependency) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>

    <script>
        // --- Setup ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- Planet Core ---
        const planetRadius = 5;
        const worldGroup = new THREE.Group();
        scene.add(worldGroup);

        // Procedural Terrain Texture
        const canvas = document.createElement('canvas');
        canvas.width = 1024;
        canvas.height = 512;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#2d5a27'; // Grass
        ctx.fillRect(0, 0, 1024, 512);
        for(let i = 0; i < 2000; i++) {
            ctx.fillStyle = `rgba(40, ${70 + Math.random() * 30}, 40, 0.5)`;
            ctx.fillRect(Math.random() * 1024, Math.random() * 512, 4, 4);
        }
        const planetTex = new THREE.CanvasTexture(canvas);

        const sphereGeo = new THREE.SphereGeometry(planetRadius, 64, 64);
        const sphereMat = new THREE.MeshStandardMaterial({ 
            map: planetTex,
            roughness: 0.8,
            metalness: 0.1
        });
        const planet = new THREE.Mesh(sphereGeo, sphereMat);
        planet.receiveShadow = true;
        worldGroup.add(planet);

        // --- Water Layer ---
        const waterGeo = new THREE.SphereGeometry(planetRadius * 0.98, 32, 32);
        const waterMat = new THREE.MeshPhongMaterial({
            color: 0x156289,
            transparent: true,
            opacity: 0.8,
            shininess: 100
        });
        const water = new THREE.Mesh(waterGeo, waterMat);
        worldGroup.add(water);

        // --- Helper: Spherical Placement ---
        function getSphericalPos(radius, phi, theta) {
            return new THREE.Vector3(
                radius * Math.sin(phi) * Math.cos(theta),
                radius * Math.cos(phi),
                radius * Math.sin(phi) * Math.sin(theta)
            );
        }

        // --- Assets Creation ---
        const createTree = (pos) => {
            const tree = new THREE.Group();
            
            const trunkGeo = new THREE.CylinderGeometry(0.05, 0.07, 0.4, 6);
            const trunkMat = new THREE.MeshStandardMaterial({ color: 0x4d2926 });
            const trunk = new THREE.Mesh(trunkGeo, trunkMat);
            trunk.position.y = 0.2;
            tree.add(trunk);

            const leavesGeo = new THREE.ConeGeometry(0.25, 0.6, 6);
            const leavesMat = new THREE.MeshStandardMaterial({ color: 0x1b4d2e });
            const leaves = new THREE.Mesh(leavesGeo, leavesMat);
            leaves.position.y = 0.5;
            tree.add(leaves);

            tree.position.copy(pos);
            tree.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), pos.clone().normalize());
            tree.castShadow = true;
            return tree;
        };

        const createHouse = (pos) => {
            const house = new THREE.Group();
            
            const bodyGeo = new THREE.BoxGeometry(0.4, 0.4, 0.4);
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0xd2b48c });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = 0.2;
            house.add(body);

            const roofGeo = new THREE.ConeGeometry(0.35, 0.3, 4);
            const roofMat = new THREE.MeshStandardMaterial({ color: 0x8b4513 });
            const roof = new THREE.Mesh(roofGeo, roofMat);
            roof.position.y = 0.5;
            roof.rotation.y = Math.PI/4;
            house.add(roof);

            house.position.copy(pos);
            house.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), pos.clone().normalize());
            house.castShadow = true;
            return house;
        };

        const createTower = (pos) => {
            const tower = new THREE.Group();
            const bodyGeo = new THREE.CylinderGeometry(0.3, 0.35, 1.2, 8);
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0x777777 });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = 0.6;
            tower.add(body);

            const topGeo = new THREE.CylinderGeometry(0.4, 0.4, 0.2, 8);
            const top = new THREE.Mesh(topGeo, bodyMat);
            top.position.y = 1.2;
            tower.add(top);

            const roofGeo = new THREE.ConeGeometry(0.45, 0.5, 8);
            const roofMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
            const roof = new THREE.Mesh(roofGeo, roofMat);
            roof.position.y = 1.5;
            tower.add(roof);

            tower.position.copy(pos);
            tower.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), pos.clone().normalize());
            tower.castShadow = true;
            return tower;
        };

        // Populate World
        for(let i = 0; i < 150; i++) {
            const phi = Math.random() * Math.PI;
            const theta = Math.random() * Math.PI * 2;
            const pos = getSphericalPos(planetRadius, phi, theta);
            
            // Avoid extreme poles for logic
            if(phi > 0.4 && phi < 2.7) {
                if(Math.random() > 0.8) {
                    worldGroup.add(createHouse(pos));
                } else {
                    worldGroup.add(createTree(pos));
                }
            }
        }

        // Castle at "North Pole"
        worldGroup.add(createTower(getSphericalPos(planetRadius, 0.1, 0)));
        worldGroup.add(createTower(getSphericalPos(planetRadius, 0.3, 0.5)));
        worldGroup.add(createTower(getSphericalPos(planetRadius, 0.3, -0.5)));

        // --- Stars ---
        const starGeo = new THREE.BufferGeometry();
        const starPos = [];
        for(let i = 0; i < 3000; i++) {
            starPos.push((Math.random() - 0.5) * 400, (Math.random() - 0.5) * 400, (Math.random() - 0.5) * 400);
        }
        starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
        const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.5 });
        const stars = new THREE.Points(starGeo, starMat);
        scene.add(stars);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0x404040, 2);
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xffffff, 3);
        sunLight.position.set(10, 20, 10);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 1024;
        sunLight.shadow.mapSize.height = 1024;
        scene.add(sunLight);

        // Atmospheric Glow
        const glowGeo = new THREE.SphereGeometry(planetRadius * 1.15, 32, 32);
        const glowMat = new THREE.MeshBasicMaterial({
            color: 0x4488ff,
            side: THREE.BackSide,
            transparent: true,
            opacity: 0.1
        });
        const glow = new THREE.Mesh(glowGeo, glowMat);
        worldGroup.add(glow);

        // --- Interaction ---
        camera.position.z = 15;
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };

        document.addEventListener('mousedown', () => isDragging = true);
        document.addEventListener('mouseup', () => isDragging = false);
        document.addEventListener('mousemove', (e) => {
            if(isDragging) {
                const deltaMove = {
                    x: e.offsetX - previousMousePosition.x,
                    y: e.offsetY - previousMousePosition.y
                };
                worldGroup.rotation.y += deltaMove.x * 0.005;
                worldGroup.rotation.x += deltaMove.y * 0.005;
            }
            previousMousePosition = { x: e.offsetX, y: e.offsetY };
        });

        document.addEventListener('wheel', (e) => {
            camera.position.z = Math.max(8, Math.min(30, camera.position.z + e.deltaY * 0.01));
        });

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);
            
            if(!isDragging) {
                worldGroup.rotation.y += 0.002;
            }

            // Subtle "pulse" for water
            water.scale.setScalar(1 + Math.sin(Date.now() * 0.001) * 0.005);
            
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
