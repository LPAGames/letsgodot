<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Popover com Imagem e Texto</title>
  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
  <!-- Popper.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js"></script>
  <!-- Bootstrap JS -->
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</head>
<body>

<div class="container mt-5">
  <div class="card" style="width: 18rem;">
    <img src="https://via.placeholder.com/150" class="card-img-top" alt="Imagem de exemplo">
    <div class="card-body">
      <h5 class="card-title">Card com Popover</h5>
      <p class="card-text">Passe o mouse sobre a imagem para ver o popover.</p>
    </div>
    <!-- Popover Content (oculto por padrão) -->
    <div id="popover-content" style="display: none;">
        <img src="https://via.placeholder.com/300" class="img-fluid" alt="Imagem Grande">
        <p class="mt-2">Este é um texto explicativo sobre a imagem.</p>
    </div>
  </div>
</div>

<script>
$(document).ready(function() {
  $('.card').popover({
    placement: 'left',
    trigger: 'hover',
    html: true,
    content: function() {
      return $('#popover-content').html();
    }
  });
});
</script>

</body>
</html>
